<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV and Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        section {
            margin: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Name</h1>
        <p>Your Tagline</p>
    </header>
    <section id="about">
        <h2>About</h2>
        <p>Brief description about yourself.</p>
    </section>
    <section id="experience">
        <h2>Experience</h2>
        <p>List your professional experiences here.</p>
    </section>
    <section id="education">
        <h2>Education</h2>
        <p>Details of your education.</p>
    </section>
    <section id="skills">
        <h2>Skills</h2>
        <p>List your skills here.</p>
    </section>
    <section id="projects">
        <h2>Projects</h2>
        <p>Highlight your projects here.</p>
    </section>
    <section id="certifications">
        <h2>Certifications</h2>
        <p>List your certifications here.</p>
    </section>
</body>
</html>
